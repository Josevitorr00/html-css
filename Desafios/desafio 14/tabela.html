<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            text-align: center;
        }

        table {
            border-collapse: collapse;
            margin: auto;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            font-weight: bold;
        }

        caption {
            padding: 10px;
            font-weight: bold;
            font-size: 1.3em;
            background-color: rgba(128, 128, 128, 0.479);
        }

        thead > tr > th {
            background-color: rgba(0, 0, 0, 0.726);
            color: white;
        }

        .exatas {
            background-color: rgb(0, 140, 255);
            color: white;
        }

        #media {
            background-color: rgba(0, 0, 0, 0.726);
            color: white;
            font-weight: bold;
            text-align: left;
        }

        .humanas {
            background-color: rgb(160, 241, 39);
            color: white;
        }

        tfoot {
            background-color: rgba(0, 0, 0, 0.726);
            color: white;
            font-weight: bold;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Tabela Desafio 14</h1>
    <table>
        <caption>
            Notas Escolares
        </caption>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" class="exatas" scope="rowgroup">Exatas</th>
                <td>Matemática</td>
                <td>7,5</td>
                <td>8,0</td>
                <td>7,8</td>
            </tr>
            <tr>
                <td>Fisica</td>
                <td>6,5</td>
                <td>7,0</td>
                <td>6,8</td>
            </tr>
            <tr>
                <td>Quimica</td>
                <td>8,5</td>
                <td>9,0</td>
                <td>8,8</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>7,0</td>
                <td>7,5</td>
                <td>7,3</td>
            </tr>
            <tr>
                <th colspan="4" id="media" scope="colgroup">Média de Exatas</th>
                <td id="media">7,7</td>
            </tr>
            <tr>
                <th rowspan="2" class="humanas" scope="rowgroup">Humanas</th>
                <td>Historia</td>
                <td>8,0</td>
                <td>8,5</td>
                <td>8,3</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>8,0</td>
                <td>8,5</td>
                <td>8,3</td>
            </tr>
            <tfoot>
                <tr>
                    <th colspan="4" scope="rowgroup">Média de Humanas</th>
                    <td>8,1</td>
                </tr>
            </tfoot>
        </tbody>
    </table>
</body>
</html>
